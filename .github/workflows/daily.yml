name: Daily GovINT Collection

on:
  schedule:
    # Run every day at 06:15 UTC
    - cron: "15 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run feed collector
        run: python scripts/collect_feeds.py

      - name: Run dataset builder
        run: python scripts/build_intel_dataset.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/ reports/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily data update $(date -u +%Y-%m-%d)"
            git push
          fi

  deploy-pages:
    needs: collect
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Pull latest data
        run: git pull --ff-only || true

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@v4
